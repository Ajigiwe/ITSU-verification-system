<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulse-number {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(60px) rotate(360deg);
                opacity: 0;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.45s ease-out;
        }

        .animate-scale-in {
            animation: scaleIn 0.35s ease-out;
        }

        .animate-pulse-number {
            animation: pulse-number 2s ease-in-out infinite;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .number-badge {
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
        }

        .number-badge-large {
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #9333ea);
            box-shadow: 0 12px 48px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── Icon Components ───────────────────────────────────────────────
        const Users = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Users">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        );

        const CheckCircle = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Success">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const XCircle = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Error">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );

        const ClipboardList = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Register">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
            </svg>
        );

        const Download = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Download">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
        );

        const Lock = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Lock">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
        );

        const Shield = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Shield">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        );

        const Hash = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Number">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
            </svg>
        );

        const Search = ({ className }) => (
            <svg className={className} fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Search">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        );

        const ADMIN_PIN = 'vader';

        // ─── Storage Utility ───────────────────────────────────────────────
        const storage = {
            getCapacity: () => {
                const cap = localStorage.getItem('eventCapacity');
                return cap ? parseInt(cap) : 350;
            },

            setCapacity: (newCap) => {
                localStorage.setItem('eventCapacity', newCap.toString());
            },

            getRegistrations: () => {
                const data = localStorage.getItem('eventRegistrations');
                return data ? JSON.parse(data) : [];
            },

            getNextNumber: () => {
                const registrations = storage.getRegistrations();
                const capacity = storage.getCapacity();
                if (registrations.length >= capacity) return null;

                const takenNumbers = new Set(registrations.map(r => r.assignedNumber));
                for (let i = 1; i <= capacity; i++) {
                    if (!takenNumbers.has(i)) return i;
                }
                return null;
            },

            saveRegistration: (data) => {
                const registrations = storage.getRegistrations();
                const capacity = storage.getCapacity();

                // Check capacity
                if (registrations.length >= capacity) {
                    return { error: `Registration is full. Maximum capacity of ${capacity} reached.` };
                }

                // Duplicate index number check
                const duplicate = registrations.find(
                    r => r.indexNumber.toLowerCase() === data.indexNumber.toLowerCase()
                );
                if (duplicate) {
                    return { error: 'This index number is already registered.', existingNumber: duplicate.assignedNumber };
                }

                const number = storage.getNextNumber();
                if (!number) {
                    return { error: 'No available numbers. Registration is full.' };
                }

                const newReg = {
                    id: crypto.randomUUID(),
                    name: data.name,
                    indexNumber: data.indexNumber,
                    assignedNumber: number,
                    registeredAt: new Date().toISOString()
                };

                registrations.push(newReg);
                localStorage.setItem('eventRegistrations', JSON.stringify(registrations));
                return newReg;
            },

            findByNumber: (number) => {
                const registrations = storage.getRegistrations();
                return registrations.find(r => r.assignedNumber === parseInt(number));
            },

            clearAll: () => {
                localStorage.removeItem('eventRegistrations');
            },

            exportCSV: () => {
                const registrations = storage.getRegistrations();
                if (registrations.length === 0) return;

                const sorted = [...registrations].sort((a, b) => a.assignedNumber - b.assignedNumber);
                const headers = ['Number', 'Name', 'Index Number', 'Registered At'];
                const rows = sorted.map(r => [
                    r.assignedNumber,
                    `"${r.name}"`,
                    `"${r.indexNumber}"`,
                    `"${new Date(r.registeredAt).toLocaleString()}"`
                ]);

                const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `event-registrations-${new Date().toISOString().slice(0, 10)}.csv`;
                link.click();
                URL.revokeObjectURL(url);
            }
        };

        // ─── Toast Notification ────────────────────────────────────────────
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3500);
                return () => clearTimeout(timer);
            }, [onClose]);

            const colors = {
                success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500'
            };

            return (
                <div className={`fixed top-6 right-6 ${colors[type]} text-white px-6 py-3 rounded-xl shadow-2xl z-[100] animate-scale-in flex items-center gap-2`}>
                    {type === 'success' && <CheckCircle className="w-5 h-5" />}
                    {type === 'error' && <XCircle className="w-5 h-5" />}
                    <span className="font-medium text-sm">{message}</span>
                </div>
            );
        };

        // ─── Registration Form ─────────────────────────────────────────────
        const RegistrationForm = () => {
            const [formData, setFormData] = useState({ name: '', indexNumber: '' });
            const [submitting, setSubmitting] = useState(false);
            const [result, setResult] = useState(null); // { assignedNumber, name } or null
            const [error, setError] = useState('');
            const nameRef = useRef(null);

            const capacity = storage.getCapacity();
            const spotsLeft = capacity - storage.getRegistrations().length;

            useEffect(() => { nameRef.current?.focus(); }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');

                const name = formData.name.trim();
                const indexNumber = formData.indexNumber.trim();

                if (!name || !indexNumber) {
                    setError('Please fill in all fields.');
                    return;
                }
                if (indexNumber.length < 3) {
                    setError('Index number must be at least 3 characters.');
                    return;
                }

                setSubmitting(true);

                setTimeout(() => {
                    const reg = storage.saveRegistration({ name, indexNumber });
                    setSubmitting(false);

                    if (reg.error) {
                        if (reg.existingNumber) {
                            setError(`${reg.error} Your number is #${reg.existingNumber}.`);
                        } else {
                            setError(reg.error);
                        }
                    } else {
                        setResult(reg);
                    }
                }, 500);
            };

            // ── Success Screen ──
            if (result) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full text-center animate-fade-in">

                            <div className="mb-6">
                                <p className="text-sm font-semibold text-indigo-500 uppercase tracking-wider mb-3">Your Event Number</p>
                                <div className="number-badge-large inline-flex items-center justify-center w-32 h-32 rounded-3xl animate-pulse-number">
                                    <span className="text-6xl font-black text-white">
                                        {result.assignedNumber}
                                    </span>
                                </div>
                            </div>

                            <h2 className="text-2xl font-extrabold text-gray-800 mb-1">Registration Complete!</h2>
                            <p className="text-gray-500 mb-6 text-sm">Save your number — you'll need it at the event.</p>

                            <div className="bg-gray-50 rounded-2xl p-5 text-left space-y-3 border border-gray-100 mb-6">
                                <div>
                                    <p className="text-xs uppercase tracking-wider text-gray-400">Name</p>
                                    <p className="text-lg font-bold text-gray-800">{result.name}</p>
                                </div>
                                <hr className="border-gray-100" />
                                <div>
                                    <p className="text-xs uppercase tracking-wider text-gray-400">Index Number</p>
                                    <p className="text-lg font-bold text-gray-800">{result.indexNumber}</p>
                                </div>
                                <hr className="border-gray-100" />
                                <div>
                                    <p className="text-xs uppercase tracking-wider text-gray-400">Event Number</p>
                                    <p className="text-2xl font-black text-indigo-600">#{result.assignedNumber}</p>
                                </div>
                            </div>

                            <div className="bg-amber-50 rounded-xl p-4 border border-amber-100">
                                <p className="text-sm text-amber-800">
                                    📸 <strong>Take a screenshot</strong> of this page. Show your number <strong>#{result.assignedNumber}</strong> at the event entrance.
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // ── Registration Form ──
            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-violet-100 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full animate-fade-in">

                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl mb-4 shadow-lg shadow-blue-200">
                                <ClipboardList className="w-8 h-8 text-white" />
                            </div>
                            <h1 className="text-3xl font-extrabold text-gray-800 mb-1">Event Registration</h1>
                            <p className="text-gray-500">Fun & Games Session</p>

                            <div className="mt-4 inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full text-sm font-semibold border border-indigo-100">
                                <Users className="w-4 h-4" />
                                {spotsLeft > 0
                                    ? <span>{spotsLeft} spot{spotsLeft !== 1 ? 's' : ''} remaining</span>
                                    : <span className="text-red-600">Registration Full</span>
                                }
                            </div>
                        </div>

                        {spotsLeft <= 0 ? (
                            <div className="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
                                <XCircle className="w-12 h-12 text-red-400 mx-auto mb-3" />
                                <h3 className="font-bold text-red-800 mb-1">Registration Closed</h3>
                                <p className="text-red-600 text-sm">All {capacity} spots have been filled.</p>
                            </div>
                        ) : (
                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2" htmlFor="reg-name">
                                        Full Name
                                    </label>
                                    <input
                                        id="reg-name"
                                        ref={nameRef}
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                                        className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 focus:outline-none transition"
                                        placeholder="Enter your full name"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2" htmlFor="reg-index">
                                        Index Number
                                    </label>
                                    <input
                                        id="reg-index"
                                        type="text"
                                        value={formData.indexNumber}
                                        onChange={(e) => setFormData({ ...formData, indexNumber: e.target.value })}
                                        className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 focus:outline-none transition"
                                        placeholder="e.g. PS/CSC/21/0042"
                                        required
                                    />
                                </div>

                                {error && (
                                    <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-3 animate-scale-in">
                                        <XCircle className="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" />
                                        <p className="text-red-700 text-sm font-medium">{error}</p>
                                    </div>
                                )}

                                <button
                                    type="submit"
                                    disabled={submitting}
                                    className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 rounded-xl hover:from-blue-700 hover:to-indigo-700 transition-all shadow-lg shadow-blue-200 hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    {submitting ? (
                                        <span className="flex items-center justify-center gap-2">
                                            <svg className="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                            </svg>
                                            Registering...
                                        </span>
                                    ) : (
                                        <span className="flex items-center justify-center gap-2">
                                            <Hash className="w-5 h-5" />
                                            Register & Get My Number
                                        </span>
                                    )}
                                </button>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        // ─── Admin PIN Gate ────────────────────────────────────────────────
        const AdminLogin = ({ onAuth }) => {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');
            const inputRef = useRef(null);

            useEffect(() => { inputRef.current?.focus(); }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (pin === ADMIN_PIN) {
                    sessionStorage.setItem('adminAuth', 'true');
                    onAuth();
                } else {
                    setError('Incorrect PIN.');
                    setPin('');
                    inputRef.current?.focus();
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-800 via-slate-900 to-gray-900 flex items-center justify-center p-4">
                    <div className="bg-white/10 glass rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center animate-fade-in border border-white/20">
                        <div className="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl mb-5 shadow-lg shadow-orange-500/30">
                            <Shield className="w-8 h-8 text-white" />
                        </div>
                        <h1 className="text-2xl font-extrabold text-white mb-1">Admin Access</h1>
                        <p className="text-gray-400 mb-6 text-sm">Enter your PIN to continue</p>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input
                                ref={inputRef}
                                type="password"
                                value={pin}
                                onChange={(e) => { setPin(e.target.value); setError(''); }}
                                maxLength={8}
                                className="w-full px-4 py-3.5 bg-white/10 border border-white/20 rounded-xl text-white text-center text-2xl tracking-[0.5em] focus:border-amber-400 focus:ring-4 focus:ring-amber-400/20 focus:outline-none transition placeholder:text-gray-500 placeholder:tracking-normal placeholder:text-base"
                                placeholder="PIN"
                                required
                                aria-label="Admin PIN"
                            />
                            {error && <p className="text-red-400 text-sm font-medium animate-scale-in">{error}</p>}
                            <button
                                type="submit"
                                className="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold py-3.5 rounded-xl hover:from-amber-600 hover:to-orange-600 transition-all shadow-lg shadow-orange-500/30"
                            >
                                <span className="flex items-center justify-center gap-2">
                                    <Lock className="w-5 h-5" />
                                    Unlock
                                </span>
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ─── Number Lookup Component (for Admin at entrance) ───────────────
        const NumberLookup = ({ onBack }) => {
            const [number, setNumber] = useState('');
            const [student, setStudent] = useState(null);
            const [error, setError] = useState('');
            const inputRef = useRef(null);

            useEffect(() => { inputRef.current?.focus(); }, []);

            const handleLookup = (e) => {
                e.preventDefault();
                setError('');
                setStudent(null);

                const num = parseInt(number.trim());
                const capacity = storage.getCapacity();
                if (isNaN(num) || num < 1 || num > capacity) {
                    setError(`Please enter a valid number between 1 and ${capacity}.`);
                    return;
                }

                const found = storage.findByNumber(num);
                if (found) {
                    setStudent(found);
                } else {
                    setError(`No student registered with number #${num}.`);
                }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl font-extrabold text-gray-800 flex items-center gap-2">
                            <Search className="w-5 h-5 text-indigo-500" />
                            Verify by Number
                        </h2>
                        <button onClick={onBack} className="text-sm text-gray-500 hover:text-gray-700 font-medium">
                            ← Back to List
                        </button>
                    </div>

                    <form onSubmit={handleLookup} className="flex gap-3">
                        <input
                            ref={inputRef}
                            type="number"
                            min="1"
                            max={storage.getCapacity()}
                            value={number}
                            onChange={(e) => { setNumber(e.target.value); setStudent(null); setError(''); }}
                            className="flex-1 px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 focus:outline-none transition text-lg font-bold text-center"
                            placeholder="Enter number"
                            required
                        />
                        <button
                            type="submit"
                            className="px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-xl hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg shadow-indigo-200"
                        >
                            Look Up
                        </button>
                    </form>

                    {error && (
                        <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex items-center gap-3 animate-scale-in">
                            <XCircle className="w-5 h-5 text-red-500 flex-shrink-0" />
                            <p className="text-red-700 text-sm font-medium">{error}</p>
                        </div>
                    )}

                    {student && (
                        <div className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-2xl p-6 border border-indigo-200 animate-scale-in">
                            <div className="flex items-center gap-4 mb-4">
                                <div className="number-badge w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0">
                                    <span className="text-2xl font-black text-white">{student.assignedNumber}</span>
                                </div>
                                <div>
                                    <h3 className="text-xl font-extrabold text-gray-800">{student.name}</h3>
                                    <p className="text-gray-500 text-sm">Index: {student.indexNumber}</p>
                                </div>
                            </div>
                            <div className="bg-white/60 rounded-xl p-3">
                                <p className="text-xs text-gray-400">
                                    Registered: {new Date(student.registeredAt).toLocaleString()}
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ─── Admin Dashboard ───────────────────────────────────────────────
        const AdminDashboard = () => {
            const [authed, setAuthed] = useState(() => sessionStorage.getItem('adminAuth') === 'true');
            const [registrations, setRegistrations] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('number'); // number, name, recent
            const [showLookup, setShowLookup] = useState(false);
            const [capacity, setCapacity] = useState(storage.getCapacity());
            const [toast, setToast] = useState(null);

            useEffect(() => {
                if (authed) loadRegistrations();
            }, [authed]);

            const loadRegistrations = () => {
                setRegistrations(storage.getRegistrations());
            };

            const handleClearAll = () => {
                if (window.confirm('⚠️ Delete ALL registrations?\n\nThis cannot be undone.')) {
                    storage.clearAll();
                    loadRegistrations();
                    setToast({ message: 'All registrations cleared.', type: 'info' });
                }
            };

            const handleExport = () => {
                storage.exportCSV();
                setToast({ message: 'CSV exported!', type: 'success' });
            };

            const handleCapacityChange = (e) => {
                const val = parseInt(e.target.value);
                if (!isNaN(val) && val > 0) {
                    setCapacity(val);
                    storage.setCapacity(val);
                }
            };

            if (!authed) {
                return <AdminLogin onAuth={() => setAuthed(true)} />;
            }

            const filtered = registrations
                .filter(reg =>
                    reg.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    reg.indexNumber.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    reg.assignedNumber.toString().includes(searchTerm)
                )
                .sort((a, b) => {
                    if (sortBy === 'number') return a.assignedNumber - b.assignedNumber;
                    if (sortBy === 'name') return a.name.localeCompare(b.name);
                    return new Date(b.registeredAt) - new Date(a.registeredAt);
                });

            const stats = {
                total: registrations.length,
                capacity: capacity,
                remaining: capacity - registrations.length
            };

            return (
                <div className="min-h-screen bg-gray-50 p-4 md:p-8">
                    {toast && <Toast {...toast} onClose={() => setToast(null)} />}
                    <div className="max-w-6xl mx-auto animate-fade-in">
                        <div className="bg-white rounded-3xl shadow-lg p-6 md:p-8">

                            {/* Header */}
                            <div className="flex items-center justify-between mb-8 flex-wrap gap-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-12 h-12 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                                        <Users className="w-6 h-6 text-white" />
                                    </div>
                                    <div>
                                        <h1 className="text-2xl md:text-3xl font-extrabold text-gray-800">Admin Dashboard</h1>
                                        <p className="text-gray-500 text-sm">Event Registration Management</p>
                                    </div>
                                </div>
                                <div className="flex gap-2 flex-wrap">
                                    <button
                                        onClick={() => setShowLookup(!showLookup)}
                                        className="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition font-semibold text-sm shadow-md shadow-indigo-200"
                                    >
                                        <Hash className="w-4 h-4" />
                                        {showLookup ? 'Show List' : 'Verify Number'}
                                    </button>
                                    {registrations.length > 0 && (
                                        <button
                                            onClick={handleExport}
                                            className="flex items-center gap-2 px-4 py-2.5 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 transition font-semibold text-sm shadow-md shadow-emerald-200"
                                        >
                                            <Download className="w-4 h-4" />
                                            Export CSV
                                        </button>
                                    )}
                                    <button
                                        onClick={loadRegistrations}
                                        className="px-4 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition font-semibold text-sm shadow-md shadow-blue-200"
                                    >
                                        ↻ Refresh
                                    </button>
                                </div>
                            </div>

                            {/* Stats */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                <div className="bg-gradient-to-br from-amber-50 to-orange-50 rounded-2xl p-5 border border-amber-100 text-center">
                                    <p className="text-sm text-amber-600 font-semibold mb-1">Total Capacity</p>
                                    <div className="flex items-center justify-center gap-2 mt-1">
                                        <input
                                            type="number"
                                            value={capacity}
                                            onChange={handleCapacityChange}
                                            className="w-20 bg-transparent text-3xl font-extrabold text-amber-700 text-center focus:outline-none focus:ring-2 focus:ring-amber-300 rounded-lg"
                                        />
                                        <span className="text-amber-400 font-bold self-end mb-1">Edit ✎</span>
                                    </div>
                                </div>
                                <div className="bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl p-5 border border-blue-100 text-center">
                                    <p className="text-sm text-blue-600 font-semibold mb-1">Registered</p>
                                    <p className="text-4xl font-extrabold text-blue-700">{stats.total}</p>
                                </div>
                                <div className="bg-gradient-to-br from-emerald-50 to-green-50 rounded-2xl p-5 border border-emerald-100 text-center">
                                    <p className="text-sm text-emerald-600 font-semibold mb-1">Spots Remaining</p>
                                    <p className="text-4xl font-extrabold text-emerald-700">{stats.remaining}</p>
                                </div>
                            </div>

                            {/* Number Lookup or Registration List */}
                            {showLookup ? (
                                <NumberLookup onBack={() => setShowLookup(false)} />
                            ) : (
                                <>
                                    {/* Search & Sort */}
                                    <div className="flex flex-col md:flex-row gap-3 mb-6">
                                        <div className="flex-1 relative">
                                            <Search className="w-4 h-4 text-gray-400 absolute left-4 top-1/2 -translate-y-1/2" />
                                            <input
                                                type="text"
                                                placeholder="Search by name, index number, or event number..."
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full pl-10 pr-4 py-2.5 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-100 focus:outline-none transition text-sm"
                                                aria-label="Search registrations"
                                            />
                                        </div>
                                        <div className="flex gap-2">
                                            {['number', 'name', 'recent'].map(s => (
                                                <button
                                                    key={s}
                                                    onClick={() => setSortBy(s)}
                                                    className={`px-3 py-2 rounded-xl font-semibold text-xs transition-all capitalize ${sortBy === s
                                                        ? 'bg-gray-800 text-white shadow-md'
                                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                                        }`}
                                                >
                                                    {s === 'number' ? '# Number' : s === 'recent' ? '🕒 Recent' : '↕ Name'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* List */}
                                    <div className="space-y-2 mb-6">
                                        {filtered.length === 0 ? (
                                            <div className="text-center py-16">
                                                <Users className="w-16 h-16 text-gray-200 mx-auto mb-4" />
                                                <p className="text-gray-400 text-lg font-medium">
                                                    {registrations.length === 0 ? 'No registrations yet' : 'No matches found'}
                                                </p>
                                            </div>
                                        ) : (
                                            filtered.map(reg => (
                                                <div key={reg.id} className="rounded-2xl p-4 flex items-center gap-4 border border-gray-100 bg-white hover:bg-gray-50 hover:shadow-sm transition">
                                                    <div className="number-badge w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0">
                                                        <span className="text-lg font-black text-white">{reg.assignedNumber}</span>
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <h3 className="font-bold text-gray-800 truncate">{reg.name}</h3>
                                                        <p className="text-gray-500 text-sm truncate">Index: {reg.indexNumber}</p>
                                                    </div>
                                                    <div className="text-right hidden sm:block">
                                                        <p className="text-xs text-gray-400">{new Date(reg.registeredAt).toLocaleString()}</p>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </>
                            )}

                            {/* Reset Database */}
                            {!showLookup && (
                                <div className="rounded-2xl p-5 bg-red-50 border border-red-200 mt-6">
                                    <h3 className="font-bold text-red-700 mb-1 flex items-center gap-2">
                                        ⚠️ Reset Database
                                    </h3>
                                    <p className="text-sm text-red-600 mb-3">
                                        Wipe all registrations and reset the number counter back to #1. Use this after testing or after an event ends.
                                    </p>
                                    <button
                                        onClick={handleClearAll}
                                        className="px-5 py-2.5 bg-red-600 text-white rounded-xl hover:bg-red-700 transition font-semibold text-sm"
                                    >
                                        Reset Database ({registrations.length} registration{registrations.length !== 1 ? 's' : ''})
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ─── Landing Page ──────────────────────────────────────────────────
        const LandingPage = ({ onNavigate }) => {
            const capacity = storage.getCapacity();
            const spotsLeft = capacity - storage.getRegistrations().length;

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full animate-fade-in text-center">
                        <div className="text-center mb-8">
                            <div
                                onClick={() => onNavigate('admin')}
                                className="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 rounded-3xl mb-5 shadow-xl shadow-purple-200 cursor-default"
                            >
                                <Hash className="w-10 h-10 text-white" />
                            </div>
                            <h1 className="text-4xl font-extrabold text-gray-800 mb-2">Fun & Games</h1>
                            <p className="text-gray-500">Event Registration System</p>
                            {spotsLeft > 0 && (
                                <div className="mt-3 inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full text-sm font-semibold border border-indigo-100">
                                    <Users className="w-4 h-4" />
                                    {spotsLeft} spot{spotsLeft !== 1 ? 's' : ''} remaining
                                </div>
                            )}
                        </div>

                        <div className="space-y-3">
                            <button
                                onClick={() => onNavigate('register')}
                                className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-xl hover:from-blue-700 hover:to-indigo-700 transition-all shadow-lg shadow-blue-200 hover:shadow-xl flex items-center justify-center gap-2"
                            >
                                <ClipboardList className="w-5 h-5" />
                                Register for Event
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── Main App ──────────────────────────────────────────────────────
        const App = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pageParam = urlParams.get('page');
            const [currentView, setCurrentView] = useState(pageParam || 'home');

            const renderView = () => {
                switch (currentView) {
                    case 'register':
                        return <RegistrationForm />;
                    case 'admin':
                        return <AdminDashboard />;
                    case 'home':
                    default:
                        return <LandingPage onNavigate={setCurrentView} />;
                }
            };

            return (
                <div>
                    {currentView !== 'home' && (
                        <button
                            onClick={() => setCurrentView('home')}
                            className="fixed top-4 left-4 bg-white/90 backdrop-blur-sm px-4 py-2.5 rounded-xl shadow-lg hover:shadow-xl transition z-50 font-semibold text-gray-700 text-sm border border-gray-200"
                            aria-label="Back to home"
                        >
                            ← Back
                        </button>
                    )}
                    {renderView()}
                </div>
            );
        };

        // React 18 createRoot
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
